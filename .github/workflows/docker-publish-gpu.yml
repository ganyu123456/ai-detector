# ============================================================
# AI 检测平台 — GPU 镜像构建与发布
# 基于 CUDA 12.2 + cuDNN 8，支持 NVIDIA GPU 加速推理
# 仅构建 linux/amd64（CUDA 不支持 arm64 交叉编译）
#
# 触发条件：
#   · push v*.*.* → 语义化版本 tag（-gpu 后缀）
#   · 手动触发
#
# 注意：GPU 镜像包含 PyTorch CUDA 版本，体积较大（约 5~8 GB）
#       构建时间较长（约 30~50 分钟）
# ============================================================
name: Build & Push GPU Image

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push-gpu:
    name: Build GPU Image (amd64)
    runs-on: ubuntu-latest
    timeout-minutes: 90

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          df -h
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /usr/local/share/boost /opt/hostedtoolcache/CodeQL
          sudo docker image prune -af
          sudo apt-get clean
          df -h

      # GPU 镜像仅 amd64，无需 QEMU
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # push v1.2.3 → v1.2.3-gpu, 1.2-gpu, gpu（滚动）
      - name: Extract Docker metadata (GPU)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=gpu,enable={{is_default_branch}}
            type=semver,pattern={{version}}-gpu
            type=semver,pattern={{major}}.{{minor}}-gpu
            type=sha,prefix=sha-,suffix=-gpu,format=short

      - name: Build and push GPU image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.gpu
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=gpu
          cache-to: type=gha,scope=gpu,mode=max

      - name: Write job summary
        run: |
          echo "## ✅ GPU 镜像已推送至 GitHub Packages" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Tag | 说明 |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|------|" >> $GITHUB_STEP_SUMMARY
          echo "| \`ghcr.io/${{ env.IMAGE_NAME }}:gpu\` | 最新 GPU 版本 |" >> $GITHUB_STEP_SUMMARY
          echo "| \`ghcr.io/${{ env.IMAGE_NAME }}:sha-$(git rev-parse --short HEAD)-gpu\` | 本次提交 GPU 版 |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> 基于 CUDA 12.2 + cuDNN 8 | 仅支持 \`linux/amd64\` + NVIDIA GPU 运行时" >> $GITHUB_STEP_SUMMARY
