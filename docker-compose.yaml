services:
  ai-detector:
    build: .
    container_name: ai-detector
    restart: unless-stopped
    ports:
      - "8090:8090"
    volumes:
      - ./data:/app/data
    environment:
      # 网关地址（用于自动同步流源）
      - GATEWAY_URL=http://miloco-camera:8080
      # SMTP 邮件（可选）
      - SMTP_ENABLED=false
      - SMTP_HOST=smtp.qq.com
      - SMTP_PORT=465
      - SMTP_USER=
      - SMTP_PASSWORD=
      - SMTP_TO=
      # Webhook 推送（可选，留空则不推送）
      - WEBHOOK_URL=
      # YOLO 默认模型
      - YOLO_MODEL=yolo11n.pt
      - YOLO_CONFIDENCE=0.5
      # 报警冷却（秒）
      - ALERT_COOLDOWN=10
    # 如果需要访问 GPU：
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
